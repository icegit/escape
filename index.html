<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Destinations</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      body {
        font-family: "Trebuchet MS", Helvetica, sans-serif;
      }
      .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
        width: clamp(960px, 50vw, 1400px);
        max-width: calc(100% - 40px);
        margin: 30px auto 0;
      }
      .card {
        margin: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: calc(100% / 3 - 40px);
      }
      .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: filter 0.3s ease;
      }
      .past img {
        filter: grayscale(100%);
      }
      .past img:hover {
        filter: none;
      }
      .card-content {
        padding: 15px;
      }
      .title {
        font-size: 24px;
        margin-bottom: 5px;
      }
      .subtitle {
        font-size: 18px;
        color: green;
        font-weight: 500;
        cursor: pointer;
      }
      .sub-subtitle {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin: 30px 0 10px;
        color: #aaa;
      }
      .icon {
        margin-right: 10px;
        color: #aaa;
      }
      .past {
        color: gray;
      }
      .past .subtitle {
        color: gray !important;
      }
      @media (max-width: 800px) {
        .container {
          padding: 0;
        }
        .card {
          width: calc(100% - 40px);
          margin: 50px 0;
        }
      }
      #toggleButton {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 10px 20px;
        background-color: #eee;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        color: #999;
      }
      #toggleButton.active {
        background-color: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <button id="toggleButton" class="active">All/Future</button>
    <div class="container"></div>

    <script>
      // 1) Base URL for your own images
      const BASE_IMG_URL = "./img/";
      // Data lives in travels.json (same folder as this file)
      let travels = [];

      let globalClickCount = 0;
      let showAll = false;

      document.getElementById("toggleButton").addEventListener("click", () => {
        showAll = !showAll;
        document.getElementById("toggleButton").classList.toggle("active");
        displayTravels();
      });

      // --- date difference helpers ---
      function dateDiff(start, end) {
        let years = end.getFullYear() - start.getFullYear();
        let months = end.getMonth() - start.getMonth();
        let days = end.getDate() - start.getDate();

        if (days < 0) {
          months--;
          const prevMonthDays = new Date(
            end.getFullYear(),
            end.getMonth(),
            0,
          ).getDate();
          days += prevMonthDays;
        }
        if (months < 0) {
          years--;
          months += 12;
        }
        return { years, months, days };
      }

      function formatDiff(diff) {
        const parts = [];
        if (diff.years)
          parts.push(diff.years + (diff.years === 1 ? " Year" : " Years"));
        if (diff.months)
          parts.push(diff.months + (diff.months === 1 ? " Month" : " Months"));
        if (diff.days)
          parts.push(diff.days + (diff.days === 1 ? " Day" : " Days"));
        return parts.length ? parts.join(" ") : "0 Days";
      }

      function daysUntil(dateStr) {
        const today = new Date();
        const travelDate = new Date(dateStr);
        let diff, fullText;

        if (travelDate < today) {
          diff = dateDiff(travelDate, today);
          fullText = formatDiff(diff) + " ago";
        } else {
          diff = dateDiff(today, travelDate);
          fullText = formatDiff(diff);
        }
        const daysRemaining = Math.ceil(
          Math.abs(travelDate - today) / (1000 * 60 * 60 * 24),
        );
        return { fullText, daysRemaining };
      }

      // strip time → midnight
      function dateOnly(d) {
        return new Date(d.getFullYear(), d.getMonth(), d.getDate());
      }

      function displayTravels() {
        const container = document.querySelector(".container");
        container.innerHTML = "";
        const todayMid = dateOnly(new Date());

        travels
          .filter((t) => {
            const td = dateOnly(new Date(t.date));
            return showAll || td.getTime() >= todayMid.getTime();
          })
          .forEach((t) => container.appendChild(createCard(t)));
      }

      function createCard(travel) {
        const travelMid = dateOnly(new Date(travel.date));
        const todayMid = dateOnly(new Date());
        const isPast = travelMid.getTime() < todayMid.getTime();
        const isToday = travelMid.getTime() === todayMid.getTime();

        // build card
        const card = document.createElement("div");
        card.className = "card";
        if (isPast) card.classList.add("past");

        // subtitle logic
        const { fullText, daysRemaining } = daysUntil(travel.date);
        const subtitle = document.createElement("p");
        subtitle.className = "subtitle";

        if (isToday) {
          subtitle.textContent = "Today";
        } else {
          if (globalClickCount % 3 === 0) subtitle.textContent = fullText;
          else if (globalClickCount % 3 === 1)
            subtitle.textContent =
              `${daysRemaining} Days` + (isPast ? " ago" : "");
          else {
            const w = Math.floor(daysRemaining / 7),
              d = daysRemaining % 7;
            subtitle.textContent =
              `${w} ${w === 1 ? "Week" : "Weeks"} ${d} ${d === 1 ? "Day" : "Days"}` +
              (isPast ? " ago" : "");
          }
        }
        subtitle.addEventListener("click", () => {
          globalClickCount = (globalClickCount + 1) % 3;
          displayTravels();
        });

        // choose src
        const imgSrc = travel.photo.startsWith("http")
          ? travel.photo
          : BASE_IMG_URL + travel.photo;

        card.innerHTML = `
        <img src="${imgSrc}" alt="${travel.city}">
        <div class="card-content">
          <h2 class="title">${travel.city}</h2>
        </div>
      `;
        card.querySelector(".card-content").appendChild(subtitle);

        // footer row
        const sub = document.createElement("div");
        sub.className = "sub-subtitle";
        sub.innerHTML = `
        <span><i class="fas fa-calendar-day icon"></i>
          ${travelMid.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })}
        </span>
        <span><i class="fas fa-clock icon"></i>${travel.days} Days</span>
        <span><i class="fas fa-map-marker-alt icon"></i>${travel.distance.toLocaleString()} km</span>
      `;
        card.querySelector(".card-content").appendChild(sub);

        return card;
      }
      async function loadTravels() {
        try {
          const response = await fetch("./travels.json");
          if (!response.ok) {
            throw new Error(`Failed to load travels.json (${response.status})`);
          }
          travels = await response.json();
          travels.sort((a, b) => new Date(a.date) - new Date(b.date));
          displayTravels();
        } catch (error) {
          console.error(error);
          document.querySelector(".container").innerHTML =
            '<p style="padding: 20px; color: #b00020;">Could not load travel data.</p>';
        }
      }

      // initial render
      loadTravels();
    </script>
  </body>
</html>
